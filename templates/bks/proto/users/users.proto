syntax = "proto3";

package users;

option go_package = "./";

message UsersAddReq {
  string mobile = 1;
  string password = 2;
  string source = 3;
}

message UsersAddResp {
  int64 id = 1;
  string mobile = 2;
}

message UsersLoginReq {
  string mobile = 1;
  string password = 2;
  string source = 3;
}

message UsersLoginResp {
  string token = 1;
  int64 expire = 2;
}

message UsersInfoReq {
  int64 id = 1;
}

message UsersInfoResp {
  int64 id = 1;
  string mobile = 2;
  string username = 3;
  string avatar = 4;
  int32 status = 5;
  string created_at = 6;
}

message UsersListReq {
  int32 page = 1;
  int32 page_size = 2;
  string keyword = 3;
  int32 status = 4;
}

message UsersListResp {
  repeated UsersInfoResp list = 1;
  int32 total = 2;
}

message UsersUpdateReq {
  int64 id = 1;
  string username = 2;
  string avatar = 3;
  int32 status = 4;
}

message UsersUpdateResp {
  int64 id = 1;
}

message UsersDeleteReq {
  int64 id = 1;
}

message UsersDeleteResp {
  bool success = 1;
}

service Users {
  rpc UsersAdd(UsersAddReq) returns (UsersAddResp);
  rpc UsersLogin(UsersLoginReq) returns (UsersLoginResp);
  rpc UsersInfo(UsersInfoReq) returns (UsersInfoResp);
  rpc UsersList(UsersListReq) returns (UsersListResp);
  rpc UsersUpdate(UsersUpdateReq) returns (UsersUpdateResp);
  rpc UsersDelete(UsersDeleteReq) returns (UsersDeleteResp);
}
